---
name: "Codex LB"
description: "Load balancer for AI provider APIs (codex-lb)"
version: "1.0.0"
slug: "codex-lb"
init: false
arch:
  - amd64
  - aarch64
homeassistant: "2024.1"
map:
  - data:rw
ports:
  2455/tcp: 2455
  1455/tcp: 1455
ports_description:
  2455/tcp: "Codex LB API + Dashboard"
  1455/tcp: "OAuth callback (server-side)"
ingress: true
ingress_port: 2455
panel_icon: mdi:robot
panel_title: Codex LB
image: "ghcr.io/andremmfaria/{arch}-addon-codex-lb"

options:
  # run.sh writes value to file; exports CODEX_LB_ENCRYPTION_KEY_FILE
  encryption_key: ""
  # Database
  database_url: "sqlite+aiosqlite:////data/codexlb.db"
  database_pool_size: 15
  database_max_overflow: 10
  database_pool_timeout_seconds: 30.0
  database_migrate_on_startup: true
  database_sqlite_pre_migrate_backup_enabled: true
  database_sqlite_pre_migrate_backup_max_files: 5
  database_sqlite_startup_check_mode: "quick"
  database_alembic_auto_remap_enabled: true
  # Upstream
  upstream_base_url: "https://chatgpt.com/backend-api"
  upstream_stream_transport: "auto"
  upstream_connect_timeout_seconds: 8.0
  upstream_websocket_trust_env: false
  # Proxy / timeouts
  proxy_request_budget_seconds: 600.0
  compact_request_budget_seconds: 75.0
  stream_idle_timeout_seconds: 300.0
  proxy_downstream_websocket_idle_timeout_seconds: 120.0
  max_sse_event_bytes: 16777216
  upstream_response_create_max_bytes: 15728640
  # Auth / OAuth
  auth_base_url: "https://auth.openai.com"
  oauth_client_id: "app_EMoamEEZ73f0CkXaXp7hrann"
  oauth_originator: "codex_chatgpt_desktop"
  oauth_scope: "openid profile email"
  oauth_timeout_seconds: 30.0
  oauth_redirect_uri: "http://localhost:1455/auth/callback"
  token_refresh_timeout_seconds: 8.0
  token_refresh_interval_days: 8
  # Usage
  usage_fetch_timeout_seconds: 10.0
  usage_fetch_max_retries: 2
  usage_refresh_enabled: true
  usage_refresh_interval_seconds: 60
  openai_cache_affinity_max_age_seconds: 1800
  openai_prompt_cache_key_derivation_enabled: true
  # HTTP responses session bridge
  http_responses_session_bridge_enabled: true
  http_responses_session_bridge_idle_ttl_seconds: 120.0
  http_responses_session_bridge_codex_idle_ttl_seconds: 900.0
  http_responses_session_bridge_codex_prewarm_enabled: false
  http_responses_session_bridge_max_sessions: 256
  http_responses_session_bridge_queue_limit: 8
  http_responses_session_bridge_gateway_safe_mode: false
  http_responses_session_bridge_instance_id: ""
  http_responses_session_bridge_instance_ring: ""
  http_responses_session_bridge_advertise_base_url: ""
  # Sticky session
  sticky_session_cleanup_enabled: true
  sticky_session_cleanup_interval_seconds: 300
  # Firewall
  firewall_trust_proxy_headers: true
  firewall_trusted_proxy_cidrs: "127.0.0.1/32,::1/128"
  # Dashboard
  dashboard_auth_mode: "standard"
  dashboard_auth_proxy_header: "Remote-User"
  dashboard_bootstrap_token: ""
  # Logging
  log_format: "text"
  log_proxy_request_shape: false
  log_proxy_request_shape_raw_cache_key: false
  log_proxy_request_payload: false
  log_proxy_service_tier_trace: false
  log_upstream_request_summary: false
  log_upstream_request_payload: false
  # Images
  max_decompressed_body_bytes: 33554432
  image_inline_fetch_enabled: true
  image_inline_allowed_hosts: ""
  images_host_model: "gpt-5.5"
  images_default_model: "gpt-image-2"
  images_max_partial_images: 3
  # Model registry
  model_registry_enabled: true
  model_registry_refresh_interval_seconds: 300
  model_registry_client_version: "0.101.0"
  model_context_window_overrides: ""
  # Proxy CIDRs / bulkhead
  proxy_unauthenticated_client_cidrs: ""
  bulkhead_proxy_limit: 512
  bulkhead_dashboard_limit: 50
  proxy_token_refresh_limit: 64
  proxy_upstream_websocket_connect_limit: 128
  proxy_response_create_limit: 256
  proxy_compact_response_create_limit: 64
  proxy_admission_wait_timeout_seconds: 10.0
  proxy_refresh_failure_cooldown_seconds: 5.0
  usage_refresh_auth_failure_cooldown_seconds: 300.0
  # Memory thresholds (0 = disabled)
  memory_warning_threshold_mb: 0
  memory_reject_threshold_mb: 0
  # Metrics
  metrics_enabled: false
  metrics_port: 9090
  # Leader election
  leader_election_enabled: false
  leader_election_ttl_seconds: 600
  # Circuit breaker
  circuit_breaker_enabled: false
  circuit_breaker_failure_threshold: 5
  circuit_breaker_recovery_timeout_seconds: 60
  # Soft drain / failover
  soft_drain_enabled: true
  deterministic_failover_enabled: true
  drain_primary_threshold_pct: 85.0
  drain_secondary_threshold_pct: 90.0
  drain_error_window_seconds: 60.0
  drain_error_count_threshold: 2
  probe_quiet_seconds: 60.0
  probe_success_streak_required: 3
  # Backpressure
  backpressure_max_concurrent_requests: 0
  # OpenTelemetry
  otel_enabled: false
  otel_exporter_endpoint: ""
  # Shutdown
  shutdown_drain_timeout_seconds: 30
  # HTTP connector
  http_connector_limit: 100
  http_connector_limit_per_host: 50
  # Transcription
  transcription_request_budget_seconds: 120.0
  # Database migrations
  database_migrations_fail_fast: true

schema:
  encryption_key: password
  database_url: str
  database_pool_size: int
  database_max_overflow: int
  database_pool_timeout_seconds: float
  database_migrate_on_startup: bool
  database_sqlite_pre_migrate_backup_enabled: bool
  database_sqlite_pre_migrate_backup_max_files: int
  database_sqlite_startup_check_mode: list(quick|full|off)
  database_alembic_auto_remap_enabled: bool
  upstream_base_url: str
  upstream_stream_transport: list(http|websocket|auto)
  upstream_connect_timeout_seconds: float
  upstream_websocket_trust_env: bool
  proxy_request_budget_seconds: float
  compact_request_budget_seconds: float
  stream_idle_timeout_seconds: float
  proxy_downstream_websocket_idle_timeout_seconds: float
  max_sse_event_bytes: int
  upstream_response_create_max_bytes: int
  auth_base_url: str
