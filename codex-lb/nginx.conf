user root;
worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Upgrade header handling for WebSocket pass-through
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8099;

        location / {
            proxy_pass         http://127.0.0.1:2455;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Ingress-Path   $http_x_ingress_path;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       $connection_upgrade;

            # Tell upstream not to compress so sub_filter can read the body.
            proxy_set_header   Accept-Encoding  identity;

            # Rewrite absolute-path references in HTML/JS responses to include
            # the HA Supervisor ingress prefix sent via X-Ingress-Path.
            # When accessed directly (no ingress), the variable is empty and
            # each substitution is a no-op, preserving the original paths.
            sub_filter_once  off;
            sub_filter_types text/html application/javascript text/javascript text/css;

            sub_filter ' src="/'   ' src="$http_x_ingress_path/';
            sub_filter " src='/"   " src='$http_x_ingress_path/";
            sub_filter ' href="/'  ' href="$http_x_ingress_path/';
            sub_filter " href='/"  " href='$http_x_ingress_path/";
            sub_filter '"/api/'    '"$http_x_ingress_path/api/';
            sub_filter "'/api/"    "'$http_x_ingress_path/api/";
        }
    }
}
