user root;
worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8099;

        location = /ingress-patch.js {
            alias /opt/ingress-patch.js;
            add_header Content-Type "application/javascript";
        }

        location / {
            proxy_pass         http://127.0.0.1:2455;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Ingress-Path   $http_x_ingress_path;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       $connection_upgrade;

            proxy_set_header   Accept-Encoding  "";

            gunzip on;

            proxy_buffering        on;
            proxy_buffer_size      16k;
            proxy_buffers          4 128k;
            proxy_busy_buffers_size 128k;

            sub_filter_once  off;
            sub_filter_types application/javascript text/javascript text/css;

            sub_filter ' src="/'  ' src="$http_x_ingress_path/';
            sub_filter " src='/"  " src='$http_x_ingress_path/";
            sub_filter ' href="/' ' href="$http_x_ingress_path/';
            sub_filter " href='/" " href='$http_x_ingress_path/";

            sub_filter 'url("/'   'url("$http_x_ingress_path/';
            sub_filter "url('/"   "url('$http_x_ingress_path/";
            sub_filter 'url(/'    'url($http_x_ingress_path/';

            sub_filter '"/api/'   '"$http_x_ingress_path/api/';
            sub_filter "'/api/"   "'$http_x_ingress_path/api/";

            sub_filter '</head>'  '<meta name="ingress-path" content="$http_x_ingress_path"><script src="$http_x_ingress_path/ingress-patch.js"></script></head>';
        }
    }
}
