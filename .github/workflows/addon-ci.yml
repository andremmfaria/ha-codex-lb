---
name: addon-ci

'on':
  push:
    branches:
      - main
    paths:
      - codex-lb/**
      - .github/workflows/addon-*.yml
  pull_request:
    paths:
      - codex-lb/**
      - .github/workflows/addon-*.yml

jobs:
  apparmor-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install apparmor
        run: |
          sudo apt-get update
          sudo apt-get install -y apparmor apparmor-utils

      - name: Validate AppArmor profile
        run: apparmor_parser -d codex-lb/apparmor.txt

  addon-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: ./codex-lb

  build:
    runs-on: ubuntu-latest
    needs:
      - apparmor-check
      - addon-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/soju06/codex-lb:latest
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/soju06/codex-lb:latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: ./codex-lb
          file: ./codex-lb/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: >-
            local/codex-lb:${{ matrix.arch }}-test
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_VERSION=test
