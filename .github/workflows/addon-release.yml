---
name: addon-release

'on':
  push:
    tags:
      - v*

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          config_version="$(
            grep '^version:' codex-lb/config.yaml | cut -d '"' -f 2
          )"
          if [ "${tag_version}" != "${config_version}" ]; then
            echo "tag version mismatch" >&2
            echo "tag=${tag_version} config=${config_version}" >&2
            exit 1
          fi
          printf 'version=%s\n' "${config_version}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs:
      - prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/soju06/codex-lb:latest
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/soju06/codex-lb:latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          IMAGE_NAME: ghcr.io/andremmfaria/${{ matrix.arch }}-addon-codex-lb
          IMAGE_VERSION: ${{ needs.prepare.outputs.version }}
        with:
          context: ./codex-lb
          file: ./codex-lb/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
